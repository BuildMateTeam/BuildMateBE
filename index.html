<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildMate BE</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

    <header>
        <h1>🧱 BuildMate BE</h1>
        <p>Minecraft Bedrock Structure Viewer</p>
    </header>

    <section class="buttons">
        <button id="openBtn">📂 Open Structure</button>
        <button id="aboutBtn">❤️ About</button>
    </section>

    <section class="status-card">
        <h2>Status</h2>
        <p id="status">🟢 Waiting...</p>
    </section>

    <section class="file-card">
        <h2>Structure</h2>
        <p id="fileName">No file selected</p>
        <p id="fileSize">--</p>
        <p id="fileType">--</p>
        <hr>

<p id="structureSize">
📐 Size: Unknown
</p>

<p id="blockCount">
🧱 Blocks: Unknown
</p>

<p id="paletteCount">
🎨 Palette: Unknown
</p>
    </section>

    <input
        type="file"
        id="fileInput"
        accept=".mcstructure"
        hidden>

    <footer>
        BuildMate BE v0.6 Alpha
    </footer>

</div>

<script src="js/ui.js"></script>
<script src="js/file.js"></script>
<script src="js/parser.js"></script>
<script src="js/app.js"></script>

</body>
</html>
